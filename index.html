<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>barbara hotel</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #0B0B0C; }
        .font-serif-luxury { font-family: 'Cormorant Garamond', serif; }
        .cal-day { width: 100%; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 6px; transition: all 0.15s; color: #a8a29e; }
        .cal-day:hover:not(:disabled) { background-color: #3f3f46; color: #e7e5e4; }
        .cal-day.cal-selected { background-color: #e7e5e4 !important; color: #000 !important; font-weight: 600; }
        .cal-day.cal-today { border: 1px solid #78716c; }
        .cal-day:disabled { color: #292524; cursor: not-allowed; }
    </style>
</head>
<body class="text-stone-300">
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getDatabase, ref, set, get, push, onValue, remove } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyADLRPkW3ZO_LyBJFreP2X6b7kSuQ-TXK8",
            authDomain: "barbara-hotel.firebaseapp.com",
            databaseURL: "https://barbara-hotel-default-rtdb.firebaseio.com",
            projectId: "barbara-hotel",
            storageBucket: "barbara-hotel.firebasestorage.app",
            messagingSenderId: "590366200762",
            appId: "1:590366200762:web:82833e1938a9cd8eed8383"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        function generateRoomId() {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let result = '';
            for (let i = 0; i < 6; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
            return result;
        }

        function generateNickname() {
            const adj = ['조용한', '신비로운', '익명의', '밤의', '숨은', '비밀의', '낯선'];
            const noun = ['투숙객', '방문자', '손님', '여행자', '탐험가'];
            return adj[Math.floor(Math.random() * adj.length)] + ' ' + noun[Math.floor(Math.random() * noun.length)];
        }

        function getNickname(roomId) {
            const key = `barbara_nick_${roomId}`;
            let nick = sessionStorage.getItem(key);
            if (!nick) {
                nick = generateNickname();
                sessionStorage.setItem(key, nick);
            }
            return nick;
        }

        function formatTime(ts) {
            if (!ts) return '';
            const d = new Date(ts);
            return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        function formatRemaining(expiresAt) {
            const diff = expiresAt - Date.now();
            if (diff <= 0) return '만료됨';
            const totalMins = Math.floor(diff / 60000);
            const days = Math.floor(totalMins / 1440);
            const hours = Math.floor((totalMins % 1440) / 60);
            const mins = totalMins % 60;
            if (days > 0) return `${days}일 ${hours}시간 후 소멸`;
            if (hours > 0) return `${hours}시간 ${mins}분 후 소멸`;
            return `${mins}분 후 소멸`;
        }

        function showMsg(el, text, type) {
            el.textContent = text;
            el.className = `text-center text-xs mt-1 ${type === 'error' ? 'text-red-400' : 'text-emerald-400'}`;
        }

        function route() {
            const hash = window.location.hash;
            if (hash.startsWith('#room/')) {
                renderPasswordPage(hash.slice(6));
            } else {
                renderLanding();
            }
        }

        // ── 랜딩 (방 생성) ──────────────────────────────────────────
        function renderLanding() {
            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex flex-col justify-between p-6 md:p-12">
                    <header class="text-center md:text-left">
                        <h1 class="font-serif-luxury text-4xl md:text-5xl tracking-widest text-stone-100 font-light lowercase">barbara hotel</h1>
                        <p class="text-xs tracking-widest text-stone-500 uppercase mt-2 font-light">personal data 0% • transient room</p>
                    </header>

                    <main class="max-w-xl w-full mx-auto my-auto py-12">
                        <div class="space-y-8">
                            <div class="text-center space-y-2">
                                <p class="font-serif-luxury italic text-2xl text-stone-400">"Leave your traces, completely erased later."</p>
                                <p class="text-xs text-stone-500 font-light">카톡 사찰을 피해, 흔적 없이 증발할 우리들만의 비밀 객실을 개설하세요.</p>
                            </div>

                            <div class="bg-[#121214] border border-stone-800/60 rounded-xl p-6 md:p-8 space-y-6 shadow-2xl">
                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-wider text-stone-500 font-medium">Room Topic</label>
                                    <input id="topic" type="text" placeholder="오늘 밤 뒷담화는 여기서. 비밀번호 아는 사람만 들어와."
                                           class="w-full bg-[#18181B] border border-stone-800 rounded-lg px-4 py-3 text-sm text-stone-200 focus:outline-none focus:border-stone-600 transition-colors placeholder:text-stone-600">
                                </div>

                                <div class="space-y-3">
                                    <label class="text-xs uppercase tracking-wider text-stone-500 font-medium">Stay Period</label>

                                    <!-- 빠른 선택 -->
                                    <div class="flex flex-wrap gap-2" id="quick-btns">
                                        <button data-mins="1"     class="quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50">1분</button>
                                        <button data-mins="5"     class="quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50">5분</button>
                                        <button data-mins="30"    class="quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50">30분</button>
                                        <button data-mins="60"    class="quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50">1시간</button>
                                        <button data-mins="360"   class="quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50">6시간</button>
                                        <button data-mins="1440"  class="quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50">1일</button>
                                        <button data-mins="10080" class="quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50">1주</button>
                                    </div>

                                    <!-- 캘린더 -->
                                    <div class="bg-[#18181B] border border-stone-800 rounded-lg p-4 space-y-3">
                                        <div class="flex items-center justify-between">
                                            <button id="cal-prev" class="text-stone-500 hover:text-stone-300 w-7 h-7 flex items-center justify-center rounded transition-colors text-base">‹</button>
                                            <span id="cal-title" class="text-xs text-stone-400 font-medium tracking-wider"></span>
                                            <button id="cal-next" class="text-stone-500 hover:text-stone-300 w-7 h-7 flex items-center justify-center rounded transition-colors text-base">›</button>
                                        </div>
                                        <div class="grid grid-cols-7 text-center mb-1">
                                            <span class="text-[10px] text-stone-600 py-0.5">일</span>
                                            <span class="text-[10px] text-stone-600 py-0.5">월</span>
                                            <span class="text-[10px] text-stone-600 py-0.5">화</span>
                                            <span class="text-[10px] text-stone-600 py-0.5">수</span>
                                            <span class="text-[10px] text-stone-600 py-0.5">목</span>
                                            <span class="text-[10px] text-stone-600 py-0.5">금</span>
                                            <span class="text-[10px] text-stone-600 py-0.5">토</span>
                                        </div>
                                        <div id="cal-grid" class="grid grid-cols-7 gap-0.5"></div>

                                        <!-- 시간 입력 (날짜 선택 후 표시) -->
                                        <div id="time-row" class="hidden border-t border-stone-800 pt-3">
                                            <div class="flex items-center justify-center gap-3">
                                                <span class="text-xs text-stone-500">체크아웃 시간</span>
                                                <div class="flex items-center gap-1">
                                                    <input id="time-hour" type="number" min="0" max="23"
                                                           class="w-12 bg-[#0B0B0C] border border-stone-700 rounded px-2 py-1.5 text-sm text-stone-200 text-center focus:outline-none focus:border-stone-500 transition-colors">
                                                    <span class="text-stone-600 font-light">:</span>
                                                    <input id="time-minute" type="number" min="0" max="59"
                                                           class="w-12 bg-[#0B0B0C] border border-stone-700 rounded px-2 py-1.5 text-sm text-stone-200 text-center focus:outline-none focus:border-stone-500 transition-colors">
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <!-- 선택된 만료 시간 표시 -->
                                    <div id="expiry-display" class="text-center text-xs min-h-[1.2rem]"></div>
                                </div>

                                <div class="space-y-2">
                                    <label class="text-xs uppercase tracking-wider text-stone-500 font-medium">Room Password</label>
                                    <input id="password" type="password" maxlength="4" placeholder="참여자들이 입력할 마스터 키 숫자 4자리"
                                           class="w-full bg-[#18181B] border border-stone-800 rounded-lg px-4 py-3 text-sm text-stone-200 focus:outline-none focus:border-stone-600 transition-colors placeholder:text-stone-600">
                                </div>

                                <button id="create-btn" class="w-full bg-stone-200 hover:bg-white text-black font-medium text-sm py-3.5 rounded-lg transition-all shadow-lg active:scale-[0.99]">
                                    객실 생성 및 링크 복사하기 (Check-in)
                                </button>
                                <p id="create-msg" class="text-center text-xs text-stone-500"></p>
                            </div>
                        </div>
                    </main>

                    <footer class="w-full max-w-xl mx-auto space-y-6 text-center">
                        <div class="border-t border-dashed border-stone-800/80 pt-4">
                            <div class="inline-flex items-center gap-2 bg-[#121214] border border-stone-800/40 px-4 py-1.5 rounded-full text-xs">
                                <span class="text-[10px] uppercase bg-stone-800 px-1.5 py-0.5 rounded text-stone-400 font-mono font-bold tracking-wider">Room Service</span>
                                <a href="#" class="text-stone-400 hover:underline font-light">"오늘 밤 대화에 어울리는 위스키 바 추천 (by 성수동 어메니티)"</a>
                            </div>
                        </div>
                        <p class="text-[10px] text-stone-600 font-light tracking-widest uppercase">© 2026 barbara hotel. No logs. No trace. Only Conversation.</p>
                    </footer>
                </div>
            `;

            const now = new Date();
            let calYear = now.getFullYear();
            let calMonth = now.getMonth();
            let selYear = null, selMonth = null, selDay = null;
            let selectedExpiry = null;

            function renderCalendar() {
                const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
                document.getElementById('cal-title').textContent = `${calYear}년 ${monthNames[calMonth]}`;

                const grid = document.getElementById('cal-grid');
                grid.innerHTML = '';

                const firstDow = new Date(calYear, calMonth, 1).getDay();
                const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
                const todayMidnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();

                for (let i = 0; i < firstDow; i++) {
                    grid.appendChild(document.createElement('div'));
                }

                for (let d = 1; d <= daysInMonth; d++) {
                    const cellTs = new Date(calYear, calMonth, d).getTime();
                    const btn = document.createElement('button');
                    btn.textContent = d;
                    btn.className = 'cal-day';

                    if (cellTs < todayMidnight) {
                        btn.disabled = true;
                    } else {
                        if (cellTs === todayMidnight) btn.classList.add('cal-today');
                        if (selYear === calYear && selMonth === calMonth && selDay === d) {
                            btn.classList.add('cal-selected');
                        }
                        btn.addEventListener('click', () => selectDay(calYear, calMonth, d));
                    }
                    grid.appendChild(btn);
                }

                const prevBtn = document.getElementById('cal-prev');
                const isCurrentMonth = calYear === now.getFullYear() && calMonth === now.getMonth();
                prevBtn.disabled = isCurrentMonth;
                prevBtn.style.opacity = isCurrentMonth ? '0.25' : '1';
            }

            function selectDay(y, m, d) {
                selYear = y; selMonth = m; selDay = d;

                const def = new Date(y, m, d, now.getHours(), now.getMinutes() + 30);
                if (def.getDate() !== d) { def.setHours(23, 59); }

                document.getElementById('time-hour').value   = def.getHours().toString().padStart(2, '0');
                document.getElementById('time-minute').value = def.getMinutes().toString().padStart(2, '0');
                document.getElementById('time-row').classList.remove('hidden');

                document.querySelectorAll('.quick-btn').forEach(b => {
                    b.className = 'quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50';
                });

                renderCalendar();
                updateExpiry();
            }

            function updateExpiry() {
                const display = document.getElementById('expiry-display');
                if (selYear === null) { display.textContent = ''; selectedExpiry = null; return; }

                const h = Math.min(23, Math.max(0, parseInt(document.getElementById('time-hour').value) || 0));
                const m = Math.min(59, Math.max(0, parseInt(document.getElementById('time-minute').value) || 0));
                const expiryTs = new Date(selYear, selMonth, selDay, h, m).getTime();
                const diff = expiryTs - Date.now();

                if (diff <= 0) {
                    display.textContent = '현재 시간 이후로 설정해주세요.';
                    display.className = 'text-center text-xs text-red-400 min-h-[1.2rem]';
                    selectedExpiry = null;
                    return;
                }

                selectedExpiry = expiryTs;

                const monthNames = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
                const totalMins = Math.floor(diff / 60000);
                const days  = Math.floor(totalMins / 1440);
                const hours = Math.floor((totalMins % 1440) / 60);
                const mins  = totalMins % 60;

                let remaining;
                if (days > 0)       remaining = `${days}일 ${hours}시간 후`;
                else if (hours > 0) remaining = `${hours}시간 ${mins}분 후`;
                else                remaining = `${mins}분 후`;

                display.textContent = `${monthNames[selMonth]} ${selDay}일 ${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}까지 · ${remaining} 소멸`;
                display.className = 'text-center text-xs text-emerald-400/70 min-h-[1.2rem]';
            }

            renderCalendar();

            document.getElementById('cal-prev').addEventListener('click', () => {
                if (calMonth === 0) { calMonth = 11; calYear--; } else calMonth--;
                renderCalendar();
            });
            document.getElementById('cal-next').addEventListener('click', () => {
                if (calMonth === 11) { calMonth = 0; calYear++; } else calMonth++;
                renderCalendar();
            });

            document.getElementById('time-hour').addEventListener('input', updateExpiry);
            document.getElementById('time-minute').addEventListener('input', updateExpiry);

            document.getElementById('quick-btns').addEventListener('click', (e) => {
                const btn = e.target.closest('.quick-btn');
                if (!btn) return;

                const mins = parseInt(btn.dataset.mins);
                const expiryTs = Date.now() + mins * 60 * 1000;
                const d = new Date(expiryTs);

                selYear  = d.getFullYear();
                selMonth = d.getMonth();
                selDay   = d.getDate();
                calYear  = selYear;
                calMonth = selMonth;

                document.getElementById('time-hour').value   = d.getHours().toString().padStart(2, '0');
                document.getElementById('time-minute').value = d.getMinutes().toString().padStart(2, '0');
                document.getElementById('time-row').classList.remove('hidden');

                document.querySelectorAll('.quick-btn').forEach(b => {
                    b.className = 'quick-btn bg-[#18181B] text-stone-500 border border-stone-800 text-xs px-3 py-1.5 rounded-lg transition-all hover:bg-stone-800/50';
                });
                btn.className = 'quick-btn bg-stone-800 text-stone-200 border border-stone-700 text-xs px-3 py-1.5 rounded-lg font-medium transition-all';

                selectedExpiry = expiryTs;
                renderCalendar();
                updateExpiry();
            });

            document.getElementById('create-btn').addEventListener('click', async () => {
                const topic    = document.getElementById('topic').value.trim();
                const password = document.getElementById('password').value.trim();
                const msg      = document.getElementById('create-msg');

                if (!topic)           { showMsg(msg, '방 제목을 입력해주세요.', 'error'); return; }
                if (!selectedExpiry)  { showMsg(msg, '체크아웃 일시를 선택해주세요.', 'error'); return; }
                if (!password || password.length < 4) { showMsg(msg, '비밀번호 4자리를 입력해주세요.', 'error'); return; }

                const btn = document.getElementById('create-btn');
                btn.textContent = '생성 중...';
                btn.disabled = true;

                const roomId = generateRoomId();
                await set(ref(db, `rooms/${roomId}`), { topic, password, expiresAt: selectedExpiry, createdAt: Date.now() });

                const roomUrl = `${window.location.origin}${window.location.pathname}#room/${roomId}`;
                try {
                    await navigator.clipboard.writeText(roomUrl);
                    showMsg(msg, '링크가 복사되었습니다! 친구에게 보내세요.', 'success');
                } catch {
                    showMsg(msg, `링크: ${roomUrl}`, 'success');
                }

                sessionStorage.setItem(`barbara_auth_${roomId}`, '1');
                setTimeout(() => { window.location.hash = `room/${roomId}`; }, 1200);
            });
        }

        // ── 비밀번호 입력 ────────────────────────────────────────────
        function renderPasswordPage(roomId) {
            if (sessionStorage.getItem(`barbara_auth_${roomId}`)) {
                renderChatRoom(roomId);
                return;
            }

            document.getElementById('app').innerHTML = `
                <div class="min-h-screen flex flex-col items-center justify-center p-6">
                    <div class="w-full max-w-sm space-y-8">
                        <div class="text-center">
                            <h1 class="font-serif-luxury text-3xl tracking-widest text-stone-100 font-light lowercase">barbara hotel</h1>
                            <p class="text-xs text-stone-500 mt-2 tracking-wider uppercase">Check-in required</p>
                        </div>
                        <div class="bg-[#121214] border border-stone-800/60 rounded-xl p-8 space-y-6">
                            <div class="text-center space-y-1">
                                <p class="text-stone-400 text-sm">객실 입장</p>
                                <p class="font-mono text-stone-600 text-xs">room-${roomId}</p>
                            </div>
                            <div class="space-y-2">
                                <label class="text-xs uppercase tracking-wider text-stone-500">비밀번호</label>
                                <input id="pw-input" type="password" maxlength="4" placeholder="••••"
                                       class="w-full bg-[#18181B] border border-stone-800 rounded-lg px-4 py-3 text-sm text-stone-200 text-center tracking-[0.5em] focus:outline-none focus:border-stone-600 transition-colors placeholder:text-stone-600">
                            </div>
                            <button id="enter-btn" class="w-full bg-stone-200 hover:bg-white text-black font-medium text-sm py-3.5 rounded-lg transition-all">
                                입장하기
                            </button>
                            <p id="pw-msg" class="text-center text-xs text-red-400 min-h-[1rem]"></p>
                        </div>
                    </div>
                </div>
            `;

            const enter = async () => {
                const pw  = document.getElementById('pw-input').value.trim();
                const msg = document.getElementById('pw-msg');
                if (!pw) return;

                const snap = await get(ref(db, `rooms/${roomId}`));
                if (!snap.exists()) { msg.textContent = '존재하지 않는 객실입니다.'; return; }

                const room = snap.val();
                if (Date.now() > room.expiresAt) {
                    await remove(ref(db, `rooms/${roomId}`));
                    msg.textContent = '이미 체크아웃된 객실입니다. 흔적은 사라졌습니다.';
                    return;
                }
                if (pw !== room.password) { msg.textContent = '비밀번호가 맞지 않습니다.'; return; }

                sessionStorage.setItem(`barbara_auth_${roomId}`, '1');
                renderChatRoom(roomId);
            };

            document.getElementById('enter-btn').addEventListener('click', enter);
            document.getElementById('pw-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') enter(); });
        }

        // ── 채팅방 ───────────────────────────────────────────────────
        async function renderChatRoom(roomId) {
            const snap = await get(ref(db, `rooms/${roomId}`));
            if (!snap.exists()) {
                document.getElementById('app').innerHTML = `<div class="min-h-screen flex items-center justify-center text-stone-500 text-sm">존재하지 않는 객실입니다.</div>`;
                return;
            }

            const room = snap.val();

            if (Date.now() > room.expiresAt) {
                await remove(ref(db, `rooms/${roomId}`));
                document.getElementById('app').innerHTML = `<div class="min-h-screen flex items-center justify-center text-stone-500 text-sm">이미 체크아웃된 객실입니다. 흔적은 사라졌습니다.</div>`;
                return;
            }

            const nickname = getNickname(roomId);

            document.getElementById('app').innerHTML = `
                <div style="height:100dvh" class="flex flex-col">
                    <div class="border-b border-stone-800/60 px-4 py-3 flex items-center justify-between bg-[#0B0B0C] shrink-0">
                        <div class="min-w-0">
                            <h1 class="font-serif-luxury text-lg tracking-widest text-stone-100 font-light lowercase">barbara hotel</h1>
                            <p class="text-xs text-stone-600 truncate">${room.topic}</p>
                        </div>
                        <div class="text-right shrink-0 ml-4">
                            <p class="text-[10px] text-stone-600 font-mono">room-${roomId}</p>
                            <p class="text-[10px] text-stone-700" id="remaining-label">${formatRemaining(room.expiresAt)}</p>
                        </div>
                    </div>

                    <div id="messages" class="flex-1 overflow-y-auto px-4 py-4 space-y-3">
                        <div class="text-center py-4">
                            <p class="font-serif-luxury italic text-stone-600 text-sm">"${room.topic}"</p>
                            <p class="text-[10px] text-stone-700 mt-2">당신은 <span class="text-stone-500">${nickname}</span>으로 입장했습니다</p>
                        </div>
                    </div>

                    <div class="border-t border-stone-800/60 px-4 py-3 bg-[#0B0B0C] shrink-0">
                        <div class="flex gap-2 max-w-2xl mx-auto">
                            <input id="msg-input" type="text" placeholder="메시지를 입력하세요..."
                                   class="flex-1 bg-[#18181B] border border-stone-800 rounded-lg px-4 py-2.5 text-sm text-stone-200 focus:outline-none focus:border-stone-600 transition-colors placeholder:text-stone-600">
                            <button id="send-btn" class="bg-stone-200 hover:bg-white text-black text-sm font-medium px-4 py-2.5 rounded-lg transition-all shrink-0">전송</button>
                        </div>
                    </div>
                </div>
            `;

            // 남은 시간 매분 갱신
            const ticker = setInterval(() => {
                const el = document.getElementById('remaining-label');
                if (!el) { clearInterval(ticker); return; }
                el.textContent = formatRemaining(room.expiresAt);
                if (Date.now() > room.expiresAt) {
                    clearInterval(ticker);
                    remove(ref(db, `rooms/${roomId}`));
                    document.getElementById('app').innerHTML = `<div class="min-h-screen flex items-center justify-center text-stone-500 text-sm">객실 체크아웃 시간이 되었습니다. 흔적은 사라졌습니다.</div>`;
                }
            }, 30000);

            const messagesContainer = document.getElementById('messages');

            onValue(ref(db, `rooms/${roomId}/messages`), (snap) => {
                messagesContainer.querySelectorAll('.msg-bubble').forEach(el => el.remove());

                const msgs = snap.val();
                if (!msgs) return;

                Object.values(msgs)
                    .sort((a, b) => a.timestamp - b.timestamp)
                    .forEach(msg => {
                        const isMe = msg.nickname === nickname;
                        const div = document.createElement('div');
                        div.className = `msg-bubble flex ${isMe ? 'justify-end' : 'justify-start'}`;
                        div.innerHTML = `
                            <div class="max-w-[75%] space-y-1">
                                ${!isMe ? `<p class="text-[10px] text-stone-600 px-1">${msg.nickname}</p>` : ''}
                                <div class="px-3 py-2 rounded-xl text-sm leading-relaxed ${isMe ? 'bg-stone-200 text-black' : 'bg-[#1C1C1F] text-stone-200 border border-stone-800/60'}">
                                    ${msg.text}
                                </div>
                                <p class="text-[10px] text-stone-700 px-1 ${isMe ? 'text-right' : ''}">${formatTime(msg.timestamp)}</p>
                            </div>
                        `;
                        messagesContainer.appendChild(div);
                    });

                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });

            const send = async () => {
                const input = document.getElementById('msg-input');
                const text = input.value.trim();
                if (!text) return;
                input.value = '';
                await push(ref(db, `rooms/${roomId}/messages`), { text, nickname, timestamp: Date.now() });
            };

            document.getElementById('send-btn').addEventListener('click', send);
            document.getElementById('msg-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });
            document.getElementById('msg-input').focus();
        }

        window.addEventListener('hashchange', route);
        route();
    </script>
</body>
</html>
